name: Sync Portfolio Data

on:
  push:
    paths:
      - 'data/profile.yaml'
      - 'data/resumes.yaml'
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

jobs:
  sync-portfolio:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout AutoCV
        uses: actions/checkout@v4

      - name: Checkout Portfolio
        uses: actions/checkout@v4
        with:
          repository: zer-art/portfolio-neo
          token: ${{ secrets.PORTFOLIO_DEPLOY_TOKEN }}
          path: portfolio-neo

      - name: Setup Pixi
        uses: prefix-dev/setup-pixi@v0.10.0
        with:
          pixi-version: v0.72.1
          cache: true

      - name: Compile Data to JSON
        run: |
          pixi run python src/sync_to_portfolio.py

      - name: Update Portfolio Data
        run: |
          cd portfolio-neo
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add src/data.json
          git diff-index --quiet HEAD || git commit -m "chore: sync data from AutoCV profile update"
          git push origin main
