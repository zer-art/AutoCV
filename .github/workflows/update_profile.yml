name: Update Profile

on:
  schedule:
    - cron: '0 0 * * 0' # Run weekly on Sunday
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-profile:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: prefix-dev/setup-pixi@v0.8.1
        with:
          pixi-version: v0.39.0
          cache: true

      - name: Validate Linux Pixi Platform Support
        run: |
          python - <<'PY'
          import tomllib

          with open("pixi.toml", "rb") as f:
              config = tomllib.load(f)

          platforms = config.get("workspace", {}).get("platforms", [])
          if "linux-64" not in platforms:
              raise SystemExit("pixi.toml workspace.platforms must include linux-64 for ubuntu workflows.")

          print("linux-64 platform support verified in pixi.toml")
          PY

      - name: Run Profile Update Script
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          pixi run python src/github_integration.py

      - name: Create Pull Request
        uses: peter-evans/create-pull-request@v6
        with:
          commit-message: "chore: update profile data"
          title: "Update Profile Data"
          body: "Auto-generated PR to update `data/profile.yaml` with latest GitHub data."
          branch: "auto-profile-update"
          delete-branch: true
          base: "main"
